# SPEC-016: one public origin for the whole app. Vite's build puts hashed
# JS/CSS under /assets/ (its default); everything else that isn't the SPA
# shell itself is an API call and gets proxied to the backend service --
# no path allowlist to maintain as new endpoints get added.
server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    location /assets/ {
        try_files $uri =404;
    }

    location = / {
        try_files /index.html =404;
    }

    location / {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
